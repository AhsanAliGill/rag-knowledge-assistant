# ─────────────────────────────────────────────────────────────────────────────
# Knowledge Assistant — full-stack dev compose
#
# Quick start (one-time setup):
#   cp .env.example .env
#   cp backend/.env.example backend/.env   # then fill in your API keys
#
# Run:
#   docker compose up --build     # first run (builds images)
#   docker compose up             # subsequent runs
#   docker compose down           # stop containers
#   docker compose down -v        # stop + wipe persistent volumes
#   docker compose logs -f        # stream all logs
#   docker compose logs -f backend  # stream backend only
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend: FastAPI + RAG pipeline ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev      # dev image: all system libs + dev deps
    container_name: knowledge-backend
    restart: unless-stopped

    env_file:
      - ./backend/.env               # real secrets — never committed

    environment:
      DEV_RELOAD: "true"             # tells entrypoint.sh to start with --reload

    ports:
      - "8000:8000"

    volumes:
      - uploads:/app/uploads
      - bm25_indexes:/app/bm25_indexes
      - ground_truth:/app/ground_truth
      - ./backend/src:/app/src       # bind mount → file saves restart uvicorn instantly

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

    networks:
      - app-net


  # ── Frontend: TanStack Start + Vite HMR ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev      # lightweight dev image running npm run dev
    container_name: knowledge-frontend
    restart: unless-stopped

    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}

    ports:
      - "3000:3000"

    volumes:
      - ./frontend/src:/app/src       # bind mount → Vite HMR refreshes browser instantly
      - /app/node_modules             # keep container's node_modules isolated from host

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - app-net


# ── Shared network ─────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge


# ── Named volumes (data persists between container rebuilds) ───────────────
volumes:
  uploads:
  bm25_indexes:
  ground_truth:
